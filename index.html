<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 주식 CAGR & 최장 물림구간 비교</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    
    <style>
        :root {
            --primary-color: #27ae60;
            --hover-color: #2ecc71;
            --bg-color: #f4f7f6;
            --box-bg: #ffffff;
            --danger-color: #e74c3c;
            --btn-color: #34495e;
            --same-color: #8e44ad;
            --same-hover: #9b59b6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            /* 모바일에서 테이블이 커질 때 바디 전체가 자연스럽게 스크롤 되도록 허용 */
            overflow-x: auto;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: var(--box-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* 핵심 CSS: 테이블 길이에 맞춰 컨테이너와 입력창이 같이 늘어나도록 설정 */
            width: fit-content;
            min-width: 100%;
            box-sizing: border-box;
            margin: 0 auto;
        }
        h1 { text-align: center; color: #2c3e50; }
        
        .example-info {
            background-color: #e8f4f8;
            color: #2980b9;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        .example-info code {
            background-color: #d4e6f1;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-transform: uppercase;
        }
        .add-btn {
            padding: 12px 20px;
            font-size: 16px;
            color: white;
            background-color: var(--primary-color);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            white-space: nowrap;
        }
        .add-btn:hover { background-color: var(--hover-color); }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .action-btn {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            white-space: nowrap;
        }
        .btn-full { background-color: #2980b9; }
        .btn-full:hover { background-color: #2471a3; }
        .btn-same { background-color: var(--same-color); }
        .btn-same:hover { background-color: var(--same-hover); }

        .chart-btn {
            background-color: var(--btn-color);
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            margin-left: 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        .chart-btn:hover { background-color: #2c3e50; }

        .ticker-list-container {
            margin-bottom: 20px;
            padding: 10px;
            background: #eee;
            border-radius: 5px;
            min-height: 40px;
        }
        .ticker-badge {
            display: inline-block;
            background: #2c3e50;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            margin: 5px;
            font-size: 14px;
        }
        .remove-btn {
            cursor: pointer;
            color: #ff6b6b;
            margin-left: 5px;
            font-weight: bold;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
            white-space: nowrap; /* 표 안의 글씨가 뭉개지지 않고 넓이를 유지하게 함 */
        }
        th, td {
            padding: 12px 15px;
            text-align: right;
            border-bottom: 1px solid #ddd;
            vertical-align: middle;
        }
        th:first-child, td:first-child { text-align: left; }
        th { background-color: #f8f9fa; }
        .loading {
            text-align: center;
            font-weight: bold;
            color: #e67e22;
            margin-top: 20px;
            margin-bottom: 20px;
            display: none;
        }
        .highlight-cagr { color: var(--primary-color); font-weight: bold; font-size: 1.1em;}
        .highlight-drawdown { color: var(--danger-color); font-weight: bold; display: flex; align-items: center; justify-content: flex-end; }
        
        /* 모달 팝업 스타일 */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.6); 
        }
        .modal-content {
            background-color: #fff;
            margin: 3% auto;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 1100px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .close-btn {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-btn:hover, .close-btn:focus { color: #000; }
        .chart-container { height: 550px; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 주식 CAGR & 최장 물림구간 비교</h1>
    
    <div class="example-info">
        💡 <strong>예시:</strong> SK하이닉스는 <code>000660.KS</code>, 삼성전자는 <code>005930.KS</code>, 비트코인은 <code>BTC-KRW</code>
    </div>
    
    <div class="input-group">
        <input type="text" id="tickerInput" placeholder="티커 입력 (예: QQQ, TQQQ)" onkeypress="handleKeyPress(event)">
        <button class="add-btn" onclick="addTicker()">추가하기</button>
    </div>

    <div class="ticker-list-container" id="tickerList"></div>

    <div class="button-group">
        <button id="btnFull" class="action-btn btn-full" onclick="processComparison('full')">전체 구간 비교하기</button>
        <button id="btnSame" class="action-btn btn-same" onclick="processComparison('same')">같은 구간 비교하기</button>
    </div>

    <div class="loading" id="loadingIndicator">데이터를 불러오고 계산 중입니다... ⏳</div>

    <table id="resultTable" style="display: none;">
        <thead>
            <tr>
                <th>티커</th>
                <th>최초 데이터</th>
                <th>최신 데이터</th>
                <th>전체 경과일</th>
                <th>최장 물림일수</th>
                <th>최장 물림 기간</th>
                <th>CAGR (연평균 수익률)</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<div id="chartModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeChartModal()">&times;</span>
        <h2 id="modalTitle" style="color: #2c3e50; margin-top: 0;">차트 분석</h2>
        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>
    </div>
</div>

<script>
    let tickers = [];
    let chartDataStore = {}; 
    let myChartInstance = null; 

    function addTicker() {
        const input = document.getElementById('tickerInput');
        const ticker = input.value.trim().toUpperCase();

        if (ticker && !tickers.includes(ticker)) {
            tickers.push(ticker);
            renderTickerList();
            input.value = '';
        } else if (tickers.includes(ticker)) {
            alert('이미 추가된 티커입니다.');
        }
        input.focus();
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') addTicker();
    }

    function removeTicker(ticker) {
        tickers = tickers.filter(t => t !== ticker);
        renderTickerList();
    }

    function renderTickerList() {
        const container = document.getElementById('tickerList');
        container.innerHTML = tickers.map(t => 
            `<span class="ticker-badge">${t} <span class="remove-btn" onclick="removeTicker('${t}')">×</span></span>`
        ).join('');
    }

    // 1단계: 야후에서 원본 데이터만 가져오는 함수
    async function fetchRawData(ticker) {
        try {
            const yahooUrl = `https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=max`;
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`;

            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error(`응답 오류: ${response.status}`);
            
            const data = await response.json();
            const resultObj = data.chart.result[0];
            
            const metaInfo = resultObj.meta;
            const stockName = metaInfo.shortName || metaInfo.longName || ticker;

            return {
                ticker,
                stockName,
                timestamps: resultObj.timestamp,
                closePrices: resultObj.indicators.quote[0].close,
                error: false
            };
        } catch (err) {
            console.error(`${ticker} 에러:`, err);
            return { ticker, error: true };
        }
    }

    // 비교하기 버튼 클릭 시 메인 로직 처리
    async function processComparison(mode) {
        if (tickers.length === 0) {
            alert('비교할 티커를 최소 1개 이상 입력해주세요.');
            return;
        }

        const btnFull = document.getElementById('btnFull');
        const btnSame = document.getElementById('btnSame');
        const loading = document.getElementById('loadingIndicator');
        const table = document.getElementById('resultTable');
        const tbody = document.getElementById('resultBody');

        btnFull.disabled = true;
        btnSame.disabled = true;
        loading.style.display = 'block';
        table.style.display = 'none';
        tbody.innerHTML = '';
        chartDataStore = {}; 

        try {
            // 모든 티커의 데이터를 병렬로 다운로드
            const rawDataArray = await Promise.all(tickers.map(fetchRawData));
            
            let commonStartTime = -1;

            // '같은 구간 비교하기'인 경우, 가장 늦게 시작된 날짜를 찾음
            if (mode === 'same') {
                const validFirstTimes = rawDataArray.filter(d => !d.error).map(d => {
                    let idx = 0;
                    while (idx < d.closePrices.length && d.closePrices[idx] === null) idx++;
                    return d.timestamps[idx]; // 해당 종목의 최초 유효 날짜
                });
                
                if (validFirstTimes.length > 0) {
                    commonStartTime = Math.max(...validFirstTimes); // 가장 늦은 날짜 추출
                }
            }

            // 계산 함수에 데이터를 넘겨 결과 산출
            const results = rawDataArray.map(raw => calculateMetrics(raw, commonStartTime));

            // 결과 화면 그리기
            results.forEach(res => {
                if(res.error) {
                    tbody.innerHTML += `<tr><td><strong>${res.ticker}</strong></td><td colspan="6" style="text-align:center; color:red;">데이터를 불러올 수 없습니다.</td></tr>`;
                    return;
                }
                
                const cagrPercent = (res.cagr * 100).toFixed(2);
                const yearsStr = (res.top1.days / 365.2425).toFixed(2);
                const periodStr = res.top1.days > 0 ? `${res.top1.startStr} ~ <br>${res.top1.endStr}` : '-';
                
                tbody.innerHTML += `
                    <tr>
                        <td>
                            <strong>${res.ticker}</strong><br>
                            <small style="color: #7f8c8d;">${res.stockName}</small>
                        </td>
                        <td>${res.firstDateStr}<br><small>($${res.firstPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})})</small></td>
                        <td>${res.lastDateStr}<br><small>($${res.lastPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})})</small></td>
                        <td>${res.daysDiff.toLocaleString()} 일</td>
                        <td>
                            <div class="highlight-drawdown">
                                ${res.top1.days > 0 ? `${yearsStr}년 (${Math.round(res.top1.days).toLocaleString()} 일)` : '0년'}
                                <button class="chart-btn" onclick="openChartModal('${res.ticker}')">[차트]</button>
                            </div>
                        </td>
                        <td style="font-size: 0.9em; color: #555;">${periodStr}</td>
                        <td class="highlight-cagr">${cagrPercent}%</td>
                    </tr>
                `;
            });
            table.style.display = 'table';
        } catch (error) {
            alert('오류가 발생했습니다.');
            console.error(error);
        } finally {
            btnFull.disabled = false;
            btnSame.disabled = false;
            loading.style.display = 'none';
        }
    }

    // 2단계: 기준 날짜(commonStartTime)를 받아 지표와 차트 데이터를 계산하는 엔진
    function calculateMetrics(raw, commonStartTime) {
        if (raw.error) return { ticker: raw.ticker, error: true };

        const timestamps = raw.timestamps;
        const closePrices = raw.closePrices;

        let firstIdx = 0;
        
        // 공통 시작일이 지정된 경우, 해당 날짜 이후부터 계산 시작
        if (commonStartTime !== -1) {
            while (firstIdx < timestamps.length && timestamps[firstIdx] < commonStartTime) {
                firstIdx++;
            }
        }
        
        // 유효한 첫 가격을 찾음 (null 무시)
        while (firstIdx < closePrices.length && closePrices[firstIdx] === null) { 
            firstIdx++; 
        }

        let lastIdx = closePrices.length - 1;
        while (lastIdx >= 0 && closePrices[lastIdx] === null) { lastIdx--; }

        if (firstIdx >= closePrices.length || firstIdx >= lastIdx) {
             return { ticker: raw.ticker, error: true }; // 데이터가 부족할 경우
        }

        const firstTime = timestamps[firstIdx]; 
        const lastTime = timestamps[lastIdx];
        const firstPrice = closePrices[firstIdx];
        const lastPrice = closePrices[lastIdx];

        const daysDiff = (lastTime - firstTime) / 86400;
        const cagr = daysDiff > 0 ? Math.pow((lastPrice / firstPrice), (365.2425 / daysDiff)) - 1 : 0;

        let drawdowns = [];
        let currentPeakPrice = -1;
        let currentPeakTime = -1;
        let currentDrawdownMaxDays = 0;
        let currentDrawdownLastTime = -1;

        const chartLabels = [];
        const chartDataPoints = [];

        // 계산 및 차트 데이터 수집은 지정된 firstIdx부터만 수행!
        for (let i = firstIdx; i <= lastIdx; i++) {
            const price = closePrices[i];
            const time = timestamps[i];
            if (price === null) continue;

            chartLabels.push(new Date(time * 1000).toISOString().split('T')[0]);
            chartDataPoints.push(price);

            if (price >= currentPeakPrice) {
                if (currentPeakTime !== -1 && currentDrawdownMaxDays > 0) {
                    drawdowns.push({ start: currentPeakTime, end: currentDrawdownLastTime, days: currentDrawdownMaxDays });
                }
                currentPeakPrice = price;
                currentPeakTime = time;
                currentDrawdownMaxDays = 0;
                currentDrawdownLastTime = time;
            } else {
                const days = (time - currentPeakTime) / 86400;
                currentDrawdownMaxDays = days;
                currentDrawdownLastTime = time;
            }
        }
        
        if (currentDrawdownMaxDays > 0) {
            drawdowns.push({ start: currentPeakTime, end: currentDrawdownLastTime, days: currentDrawdownMaxDays });
        }

        drawdowns.sort((a, b) => b.days - a.days);

        const top1 = drawdowns[0] || { start: firstTime, end: firstTime, days: 0 };
        const top2 = drawdowns[1] || { start: firstTime, end: firstTime, days: 0 };

        top1.startStr = new Date(top1.start * 1000).toISOString().split('T')[0];
        top1.endStr = new Date(top1.end * 1000).toISOString().split('T')[0];
        top2.startStr = new Date(top2.start * 1000).toISOString().split('T')[0];
        top2.endStr = new Date(top2.end * 1000).toISOString().split('T')[0];

        const firstDateStr = new Date(firstTime * 1000).toISOString().split('T')[0];
        const lastDateStr = new Date(lastTime * 1000).toISOString().split('T')[0];

        chartDataStore[raw.ticker] = {
            labels: chartLabels,
            dataPoints: chartDataPoints,
            stockName: raw.stockName,
            top1: top1,
            top2: top2
        };

        return {
            ticker: raw.ticker, stockName: raw.stockName, firstDateStr, lastDateStr, firstPrice, lastPrice,
            daysDiff: Math.round(daysDiff), cagr,
            top1, error: false
        };
    }

    function openChartModal(ticker) {
        const modal = document.getElementById('chartModal');
        const title = document.getElementById('modalTitle');
        const ctx = document.getElementById('priceChart').getContext('2d');
        const chartData = chartDataStore[ticker];

        if (!chartData) return;

        title.innerHTML = `${chartData.stockName} (${ticker}) 주가 흐름 및 물림구간`;
        modal.style.display = 'block';

        if (myChartInstance) {
            myChartInstance.destroy();
        }

        const annotations = {};
        if (chartData.top1.days > 0) {
            annotations.box1 = {
                type: 'box',
                xMin: chartData.top1.startStr,
                xMax: chartData.top1.endStr,
                backgroundColor: 'rgba(231, 76, 60, 0.25)', 
                borderWidth: 0,
                label: {
                    display: true,
                    content: `1위 (${(chartData.top1.days/365.2425).toFixed(2)}년)`,
                    position: 'start',
                    color: 'black',
                    backgroundColor: 'rgba(255, 255, 255, 0.7)',
                    font: { size: 13, weight: 'bold' }
                }
            };
        }
        if (chartData.top2.days > 0) {
            annotations.box2 = {
                type: 'box',
                xMin: chartData.top2.startStr,
                xMax: chartData.top2.endStr,
                backgroundColor: 'rgba(243, 156, 18, 0.25)', 
                borderWidth: 0,
                label: {
                    display: true,
                    content: `2위 (${(chartData.top2.days/365.2425).toFixed(2)}년)`,
                    position: 'start',
                    color: 'black',
                    backgroundColor: 'rgba(255, 255, 255, 0.7)',
                    font: { size: 13, weight: 'bold' }
                }
            };
        }

        myChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartData.labels,
                datasets: [{
                    label: `종가 (Log Scale)`,
                    data: chartData.dataPoints,
                    borderColor: '#3498db',
                    borderWidth: 1.5,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    fill: false,
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: { display: false },
                    annotation: { annotations: annotations }
                },
                scales: {
                    x: { 
                        type: 'time',
                        time: {
                            unit: 'year',
                            displayFormats: { year: 'yyyy' }
                        },
                        ticks: { maxRotation: 0 }
                    },
                    y: { 
                        type: 'logarithmic',
                        ticks: { 
                            callback: function(value) { 
                                return '$' + value.toLocaleString(); 
                            } 
                        }
                    }
                }
            }
        });
    }

    function closeChartModal() {
        document.getElementById('chartModal').style.display = 'none';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('chartModal');
        if (event.target == modal) closeChartModal();
    }
</script>

</body>
</html>
