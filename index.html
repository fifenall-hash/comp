<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 주식 CAGR & 최장 물림구간 비교</title>
    
    <link rel="icon" href="icon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#27ae60">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    
    <style>
        :root {
            --primary-color: #27ae60;
            --hover-color: #2ecc71;
            --bg-color: #f4f7f6;
            --box-bg: #ffffff;
            --danger-color: #e74c3c;
            --btn-color: #34495e;
            --same-color: #8e44ad;
            --same-hover: #9b59b6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 15px; 
            box-sizing: border-box;
        }
        .container {
            background-color: var(--box-bg);
            padding: 25px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%; 
            max-width: 1200px; 
            box-sizing: border-box;
            margin: 0 auto;
        }
        h1 { text-align: center; color: #2c3e50; font-size: 1.6em; }
        
        .example-info {
            background-color: #e8f4f8;
            color: #2980b9;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            word-break: keep-all; 
        }
        .example-info code {
            background-color: #d4e6f1;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-transform: uppercase;
            width: 100%;
            box-sizing: border-box;
        }
        .add-btn {
            padding: 12px 20px;
            font-size: 16px;
            color: white;
            background-color: var(--primary-color);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            white-space: nowrap;
        }
        .add-btn:hover { background-color: var(--hover-color); }
        
        .button-group {
            display: flex;
            flex-wrap: wrap; 
            gap: 10px;
            margin-bottom: 20px;
        }
        .action-btn {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            white-space: nowrap;
            min-width: 140px;
        }
        .btn-full { background-color: #2980b9; }
        .btn-full:hover { background-color: #2471a3; }
        .btn-same { background-color: var(--same-color); }
        .btn-same:hover { background-color: var(--same-hover); }

        .chart-btn {
            background-color: var(--btn-color);
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            margin-left: 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        .chart-btn:hover { background-color: #2c3e50; }

        .ticker-list-container {
            margin-bottom: 20px;
            padding: 10px;
            background: #eee;
            border-radius: 5px;
            min-height: 40px;
        }
        .ticker-badge {
            display: inline-block;
            background: #2c3e50;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            margin: 5px;
            font-size: 14px;
        }
        .remove-btn {
            cursor: pointer;
            color: #ff6b6b;
            margin-left: 5px;
            font-weight: bold;
        }
        
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            border-radius: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
            white-space: nowrap; 
        }
        th, td {
            padding: 12px 15px;
            text-align: right;
            border-bottom: 1px solid #ddd;
            vertical-align: middle;
        }
        th:first-child, td:first-child { text-align: left; }
        th { background-color: #f8f9fa; }
        .loading {
            text-align: center;
            font-weight: bold;
            color: #e67e22;
            margin-top: 20px;
            margin-bottom: 20px;
            display: none;
        }
        
        /* 테이블 안 요소 정렬 보정 */
        .highlight-drawdown { display: flex; align-items: center; justify-content: flex-end; color: var(--danger-color); font-weight: bold; }
        .highlight-cagr { display: flex; align-items: center; justify-content: flex-end; color: var(--primary-color); font-weight: bold; font-size: 1.1em; }
        
        /* 모달 팝업 스타일 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); }
        .modal-content {
            background-color: #fff; margin: 5% auto; padding: 20px; border-radius: 10px;
            width: 95%; max-width: 1100px; box-sizing: border-box; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-btn:hover { color: #000; }
        .chart-container { height: 60vh; min-height: 400px; width: 100%; margin-top: 20px; }

        @media (orientation: portrait) {
            table, thead, tbody, tr, th, td { display: block; }
            table { font-size: 13px; white-space: normal; }
            tr {
                display: grid;
                grid-template-columns: repeat(12, 1fr);
                border-bottom: 4px solid #bdc3c7; 
                margin-bottom: 10px;
                background-color: #fff;
            }
            thead tr { margin-bottom: 0; border-bottom: 2px solid #2c3e50; }
            th, td { border-bottom: none; text-align: center !important; padding: 10px 4px; word-break: keep-all; }
            th:nth-child(1), td:nth-child(1), th:nth-child(2), td:nth-child(2),
            th:nth-child(3), td:nth-child(3), th:nth-child(4), td:nth-child(4) {
                grid-column: span 3; border-bottom: 1px dashed #ecf0f1; 
            }
            th:nth-child(5), td:nth-child(5), th:nth-child(6), td:nth-child(6),
            th:nth-child(7), td:nth-child(7) { grid-column: span 4; }
            
            .highlight-drawdown, .highlight-cagr { justify-content: center; flex-direction: column; gap: 5px; }
            .chart-btn { margin-left: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 주식 CAGR & 최장 물림구간 비교</h1>
    
    <div class="example-info">
        💡 <strong>예시:</strong> SK하이닉스 <code>000660.KS</code>, 삼성전자 <code>005930.KS</code>, 비트코인 <code>BTC-KRW</code>
    </div>
    
    <div class="input-group">
        <input type="text" id="tickerInput" placeholder="티커 입력 (예: QQQ, TQQQ)" onkeypress="handleKeyPress(event)">
        <button class="add-btn" onclick="addTicker()">추가하기</button>
    </div>

    <div class="ticker-list-container" id="tickerList"></div>

    <div class="button-group">
        <button id="btnFull" class="action-btn btn-full" onclick="processComparison('full')">전체 구간 비교하기</button>
        <button id="btnSame" class="action-btn btn-same" onclick="processComparison('same')">같은 구간 비교하기</button>
    </div>

    <div class="loading" id="loadingIndicator">데이터를 불러오고 계산 중입니다. 최적 구간 탐색 중입니다... ⏳</div>

    <div class="table-wrapper">
        <table id="resultTable" style="display: none;">
            <thead>
                <tr>
                    <th>티커</th>
                    <th>최초 데이터</th>
                    <th>최신 데이터</th>
                    <th>전체 경과일</th>
                    <th>최장 물림일수</th>
                    <th>최장 물림기간</th>
                    <th>CAGR (수익률)</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>
</div>

<div id="chartModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeChartModal()">&times;</span>
        <h2 id="modalTitle" style="color: #2c3e50; margin-top: 0; font-size: 1.3em;">차트 분석</h2>
        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>
    </div>
</div>

<script>
    let tickers = [];
    let chartDataStore = {}; 
    let myChartInstance = null; 

    function addTicker() {
        const input = document.getElementById('tickerInput');
        const ticker = input.value.trim().toUpperCase();

        if (ticker && !tickers.includes(ticker)) {
            tickers.push(ticker);
            renderTickerList();
            input.value = '';
        } else if (tickers.includes(ticker)) {
            alert('이미 추가된 티커입니다.');
        }
        input.focus();
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') addTicker();
    }

    function removeTicker(ticker) {
        tickers = tickers.filter(t => t !== ticker);
        renderTickerList();
    }

    function renderTickerList() {
        const container = document.getElementById('tickerList');
        container.innerHTML = tickers.map(t => 
            `<span class="ticker-badge">${t} <span class="remove-btn" onclick="removeTicker('${t}')">×</span></span>`
        ).join('');
    }

    async function fetchRawData(ticker) {
        const now = Math.floor(Date.now() / 1000);
        const past = -2208988800; 
        const yahooUrl = `https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?period1=${past}&period2=${now}&interval=1d`;
        
        const proxies = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(yahooUrl)}`,
            `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`,
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(yahooUrl)}`
        ];

        let data = null;
        let lastError = "";

        for (const proxyUrl of proxies) {
            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                data = await response.json();
                if (data && data.chart && data.chart.result) {
                    break; 
                } else {
                    throw new Error("야후 데이터 응답 오류");
                }
            } catch (err) {
                lastError = err.message;
                data = null;
            }
        }

        if (!data) {
            console.error(`[${ticker}] 다운로드 실패:`, lastError);
            return { ticker, error: true, errMsg: `통신 차단 (${lastError})` };
        }

        try {
            const resultObj = data.chart.result[0];
            const metaInfo = resultObj.meta;
            const stockName = metaInfo.shortName || metaInfo.longName || ticker;
            const rawTimestamps = resultObj.timestamp || [];
            
            let rawPrices = [];
            if (resultObj.indicators.adjclose && resultObj.indicators.adjclose[0].adjclose) {
                rawPrices = resultObj.indicators.adjclose[0].adjclose;
            } else if (resultObj.indicators.quote && resultObj.indicators.quote[0].close) {
                rawPrices = resultObj.indicators.quote[0].close;
            }

            const cleanTimestamps = [];
            const cleanPrices = [];

            for (let i = 0; i < rawTimestamps.length; i++) {
                const t = rawTimestamps[i];
                const price = rawPrices[i];
                if (t && !isNaN(t) && price !== null && price !== undefined && typeof price === 'number' && price > 0) {
                    cleanTimestamps.push(t);
                    cleanPrices.push(price);
                }
            }

            if (cleanTimestamps.length === 0) {
                throw new Error("유효한 가격 데이터가 없습니다.");
            }

            return {
                ticker,
                stockName,
                timestamps: cleanTimestamps, 
                closePrices: cleanPrices,   
                error: false
            };
        } catch (err) {
            return { ticker, error: true, errMsg: "데이터 정제 오류" };
        }
    }

    async function processComparison(mode) {
        if (tickers.length === 0) {
            alert('비교할 티커를 최소 1개 이상 입력해주세요.');
            return;
        }

        const btnFull = document.getElementById('btnFull');
        const btnSame = document.getElementById('btnSame');
        const loading = document.getElementById('loadingIndicator');
        const table = document.getElementById('resultTable');
        const tbody = document.getElementById('resultBody');

        btnFull.disabled = true;
        btnSame.disabled = true;
        loading.style.display = 'block';
        table.style.display = 'none';
        tbody.innerHTML = '';
        chartDataStore = {}; 

        try {
            await new Promise(r => setTimeout(r, 50)); 
            
            const rawDataArray = await Promise.all(tickers.map(fetchRawData));
            let commonStartTime = -1;

            if (mode === 'same') {
                const validFirstTimes = rawDataArray.filter(d => !d.error).map(d => d.timestamps[0]);
                if (validFirstTimes.length > 0) {
                    commonStartTime = Math.max(...validFirstTimes); 
                }
            }

            const results = rawDataArray.map(raw => calculateMetrics(raw, commonStartTime));

            results.forEach(res => {
                if(res.error) {
                    tbody.innerHTML += `<tr><td><strong>${res.ticker}</strong></td><td colspan="6" style="text-align:center; color:red;"><strong>에러:</strong> ${res.errMsg}</td></tr>`;
                    return;
                }
                
                const cagrPercent = (res.cagr * 100).toFixed(2);
                const yearsStr = (res.top1.days / 365.2425).toFixed(2);
                const periodStr = res.top1.days > 0 ? `${res.top1.startStr} ~ <br>${res.top1.endStr}` : '-';
                
                tbody.innerHTML += `
                    <tr>
                        <td>
                            <strong>${res.ticker}</strong><br>
                            <small style="color: #7f8c8d;">${res.stockName}</small>
                        </td>
                        <td>${res.firstDateStr}<br><small>($${res.firstPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})})</small></td>
                        <td>${res.lastDateStr}<br><small>($${res.lastPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})})</small></td>
                        <td>${res.daysDiff.toLocaleString()} 일</td>
                        <td>
                            <div class="highlight-drawdown">
                                <span>${res.top1.days > 0 ? `${yearsStr}년 (${Math.round(res.top1.days).toLocaleString()}일)` : '0년'}</span>
                                <button class="chart-btn" onclick="openChartModal('${res.ticker}', 'drawdown')">[차트]</button>
                            </div>
                        </td>
                        <td style="font-size: 0.9em; color: #555;">${periodStr}</td>
                        <td>
                            <div class="highlight-cagr">
                                <span>${cagrPercent}%</span>
                                <button class="chart-btn" onclick="openChartModal('${res.ticker}', 'cagr')">[차트]</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            table.style.display = 'table';
        } catch (error) {
            alert('데이터 처리 중 오류가 발생했습니다.');
            console.error(error);
        } finally {
            btnFull.disabled = false;
            btnSame.disabled = false;
            loading.style.display = 'none';
        }
    }

    function calculateMetrics(raw, commonStartTime) {
        if (raw.error) return raw; 

        try {
            const timestamps = raw.timestamps;
            const closePrices = raw.closePrices;

            let firstIdx = 0;
            if (commonStartTime !== -1) {
                while (firstIdx < timestamps.length && timestamps[firstIdx] < commonStartTime) {
                    firstIdx++;
                }
            }

            if (firstIdx >= closePrices.length) return { ticker: raw.ticker, error: true, errMsg: "해당 구간에 데이터가 없습니다." }; 
            const lastIdx = closePrices.length - 1;
            if (firstIdx >= lastIdx) return { ticker: raw.ticker, error: true, errMsg: "비교 가능한 기간이 너무 짧습니다." }; 

            const firstTime = timestamps[firstIdx]; 
            const lastTime = timestamps[lastIdx];
            const firstPrice = closePrices[firstIdx];
            const lastPrice = closePrices[lastIdx];
            const totalDuration = lastTime - firstTime;

            const daysDiff = totalDuration / 86400;
            const cagr = daysDiff > 0 ? Math.pow((lastPrice / firstPrice), (365.2425 / daysDiff)) - 1 : 0;

            // --- 1. 최장 물림기간(Drawdown Duration) 분석 ---
            let drawdowns = [];
            let currentPeakPrice = -1;
            let currentPeakTime = -1;
            let currentDrawdownMaxDays = 0;
            let currentDrawdownLastTime = -1;

            const chartLabels = [];
            const chartDataPoints = [];

            for (let i = firstIdx; i <= lastIdx; i++) {
                const price = closePrices[i];
                const time = timestamps[i];

                chartLabels.push(new Date(time * 1000).toISOString().split('T')[0]);
                chartDataPoints.push(price);

                if (price >= currentPeakPrice) {
                    if (currentPeakTime !== -1 && currentDrawdownMaxDays > 0) {
                        drawdowns.push({ start: currentPeakTime, end: currentDrawdownLastTime, days: currentDrawdownMaxDays });
                    }
                    currentPeakPrice = price;
                    currentPeakTime = time;
                    currentDrawdownMaxDays = 0;
                    currentDrawdownLastTime = time;
                } else {
                    const days = (time - currentPeakTime) / 86400;
                    currentDrawdownMaxDays = days;
                    currentDrawdownLastTime = time;
                }
            }
            
            if (currentDrawdownMaxDays > 0) {
                drawdowns.push({ start: currentPeakTime, end: currentDrawdownLastTime, days: currentDrawdownMaxDays });
            }
            drawdowns.sort((a, b) => b.days - a.days);

            const top1 = drawdowns[0] || { start: firstTime, end: firstTime, days: 0 };
            const top2 = drawdowns[1] || { start: firstTime, end: firstTime, days: 0 };

            top1.startStr = new Date(top1.start * 1000).toISOString().split('T')[0];
            top1.endStr = new Date(top1.end * 1000).toISOString().split('T')[0];
            top2.startStr = new Date(top2.start * 1000).toISOString().split('T')[0];
            top2.endStr = new Date(top2.end * 1000).toISOString().split('T')[0];

            // 💡 텍스트 짤림 방지: 구간의 [끝점(end)]이 차트의 50%를 넘어가면 우측으로 글씨가 정렬되도록 개선
            top1.labelAlign = (totalDuration > 0 && ((top1.end - firstTime) / totalDuration) > 0.5) ? 'end' : 'start';
            top2.labelAlign = (totalDuration > 0 && ((top2.end - firstTime) / totalDuration) > 0.5) ? 'end' : 'start';

            // --- 2. MDD 기반 및 역MDD 기반 후보 쌍(Pairing) 추출 알고리즘 ---
            let mdEpisodes = [];
            let pPrice = -1;
            let pIdx = -1;
            let epMinP = Infinity;
            let epMinIdx = -1;

            for (let i = firstIdx; i <= lastIdx; i++) {
                const price = closePrices[i];
                if (price >= pPrice) {
                    if (pIdx !== -1 && epMinIdx !== -1 && pPrice > epMinP) {
                        mdEpisodes.push({ troughIdx: epMinIdx, drop: (pPrice - epMinP) / pPrice });
                    }
                    pPrice = price; pIdx = i; epMinP = price; epMinIdx = i;
                } else {
                    if (price < epMinP) {
                        epMinP = price; epMinIdx = i;
                    }
                }
            }
            if (pIdx !== -1 && epMinIdx !== -1 && pPrice > epMinP) {
                mdEpisodes.push({ troughIdx: epMinIdx, drop: (pPrice - epMinP) / pPrice });
            }
            mdEpisodes.sort((a, b) => b.drop - a.drop);
            const top10Troughs = mdEpisodes.slice(0, 10).map(ep => ep.troughIdx);

            let revEpisodes = [];
            let rMinP = closePrices[lastIdx];
            let rMinIdx = lastIdx;
            let rPeakP = closePrices[lastIdx];
            let rPeakIdx = lastIdx;

            for (let i = lastIdx - 1; i >= firstIdx; i--) {
                const price = closePrices[i];
                if (price <= rMinP) { 
                    if (rPeakIdx !== -1 && rMinIdx !== -1 && rPeakP > rMinP) {
                        revEpisodes.push({ peakIdx: rPeakIdx, revMdd: (rPeakP - rMinP) / rMinP });
                    }
                    rMinP = price; rMinIdx = i; rPeakP = price; rPeakIdx = i;
                } else {
                    if (price > rPeakP) {
                        rPeakP = price; rPeakIdx = i;
                    }
                }
            }
            if (rPeakIdx !== -1 && rMinIdx !== -1 && rPeakP > rMinP) {
                revEpisodes.push({ peakIdx: rPeakIdx, revMdd: (rPeakP - rMinP) / rMinP });
            }
            revEpisodes.sort((a, b) => b.revMdd - a.revMdd);
            const top10Peaks = revEpisodes.slice(0, 10).map(ep => ep.peakIdx);

            let pairMap = new Map();
            
            for (let T of top10Troughs) {
                let bestP = -1; let minDist = Infinity;
                for (let P of top10Peaks) {
                    if (P > T && (timestamps[P] - timestamps[T]) / 86400 >= 365.2425) { 
                        if (P - T < minDist) { minDist = P - T; bestP = P; }
                    }
                }
                if (bestP !== -1) pairMap.set(`${T}-${bestP}`, { sIdx: T, eIdx: bestP });
            }
            
            for (let P of top10Peaks) {
                let bestT = -1; let minDist = Infinity;
                for (let T of top10Troughs) {
                    if (P > T && (timestamps[P] - timestamps[T]) / 86400 >= 365.2425) {
                        if (P - T < minDist) { minDist = P - T; bestT = T; }
                    }
                }
                if (bestT !== -1) pairMap.set(`${bestT}-${P}`, { sIdx: bestT, eIdx: P });
            }

            let cagrCandidates = Array.from(pairMap.values());
            
            cagrCandidates.forEach(c => {
                let days = (timestamps[c.eIdx] - timestamps[c.sIdx]) / 86400;
                c.cagr = Math.pow(closePrices[c.eIdx] / closePrices[c.sIdx], 365.2425 / days) - 1;
            });

            cagrCandidates.sort((a, b) => b.cagr - a.cagr);

            let cagrTop1Obj = { valid: false, startStr: '', endStr: '', cagr: 0, labelAlign: 'start' };
            let cagrTop2Obj = { valid: false, startStr: '', endStr: '', cagr: 0, labelAlign: 'start' };

            const firstDateStr = new Date(firstTime * 1000).toISOString().split('T')[0];
            const lastDateStr = new Date(lastTime * 1000).toISOString().split('T')[0];

            if (cagrCandidates.length > 0) {
                let win1 = cagrCandidates[0];
                cagrTop1Obj.valid = true;
                cagrTop1Obj.cagr = win1.cagr;
                cagrTop1Obj.startStr = chartLabels[win1.sIdx - firstIdx];
                cagrTop1Obj.endStr = chartLabels[win1.eIdx - firstIdx];
                // 💡 텍스트 짤림 방지: 구간의 [끝점(end)]이 차트의 50%를 넘어가면 우측으로 글씨가 정렬되도록 개선
                cagrTop1Obj.labelAlign = (totalDuration > 0 && ((timestamps[win1.eIdx] - firstTime) / totalDuration) > 0.5) ? 'end' : 'start';

                for (let i = 1; i < cagrCandidates.length; i++) {
                    let win2 = cagrCandidates[i];
                    if (win2.eIdx > win1.sIdx && win2.sIdx < win1.eIdx) {
                        continue; 
                    }
                    cagrTop2Obj.valid = true;
                    cagrTop2Obj.cagr = win2.cagr;
                    cagrTop2Obj.startStr = chartLabels[win2.sIdx - firstIdx];
                    cagrTop2Obj.endStr = chartLabels[win2.eIdx - firstIdx];
                    // 💡 텍스트 짤림 방지: 구간의 [끝점(end)]이 차트의 50%를 넘어가면 우측으로 글씨가 정렬되도록 개선
                    cagrTop2Obj.labelAlign = (totalDuration > 0 && ((timestamps[win2.eIdx] - firstTime) / totalDuration) > 0.5) ? 'end' : 'start';
                    break;
                }
            }

            chartDataStore[raw.ticker] = {
                labels: chartLabels,
                dataPoints: chartDataPoints,
                stockName: raw.stockName,
                top1: top1,
                top2: top2,
                cagrTop1: cagrTop1Obj,
                cagrTop2: cagrTop2Obj
            };

            return {
                ticker: raw.ticker, stockName: raw.stockName, firstDateStr, lastDateStr, firstPrice, lastPrice,
                daysDiff: Math.round(daysDiff), cagr,
                top1, error: false
            };

        } catch (e) {
            console.error(`[${raw.ticker}] 계산 로직 에러:`, e);
            return { ticker: raw.ticker, error: true, errMsg: `연산 오류 (${e.message})` };
        }
    }

    function openChartModal(ticker, type) {
        const modal = document.getElementById('chartModal');
        const title = document.getElementById('modalTitle');
        const ctx = document.getElementById('priceChart').getContext('2d');
        const chartData = chartDataStore[ticker];

        if (!chartData) return;

        if (myChartInstance) {
            myChartInstance.destroy();
        }

        const annotations = {};
        
        if (type === 'drawdown') {
            title.innerHTML = `${chartData.stockName} (${ticker}) 흐름 및 <span style="color:#e74c3c">최장 물림기간 (고통 구간)</span>`;
            
            if (chartData.top1.days > 0) {
                annotations.box1 = {
                    type: 'box', xMin: chartData.top1.startStr, xMax: chartData.top1.endStr,
                    backgroundColor: 'rgba(231, 76, 60, 0.25)', borderWidth: 0,
                    label: {
                        display: true, content: `1위 (${(chartData.top1.days/365.2425).toFixed(2)}년)`,
                        position: { x: chartData.top1.labelAlign, y: 'start' }, color: 'black',
                        backgroundColor: 'rgba(255, 255, 255, 0.7)', font: { size: 13, weight: 'bold' }
                    }
                };
            }
            if (chartData.top2.days > 0) {
                annotations.box2 = {
                    type: 'box', xMin: chartData.top2.startStr, xMax: chartData.top2.endStr,
                    backgroundColor: 'rgba(243, 156, 18, 0.25)', borderWidth: 0,
                    label: {
                        display: true, content: `2위 (${(chartData.top2.days/365.2425).toFixed(2)}년)`,
                        position: { x: chartData.top2.labelAlign, y: 'start' }, yAdjust: 32, 
                        color: 'black', backgroundColor: 'rgba(255, 255, 255, 0.7)', font: { size: 13, weight: 'bold' }
                    }
                };
            }
        } 
        else if (type === 'cagr') {
            title.innerHTML = `${chartData.stockName} (${ticker}) 흐름 및 <span style="color:#27ae60">MDD 딥 밸류 페어링 최고 CAGR 구간</span>`;
            
            if (chartData.cagrTop1.valid) {
                annotations.box1 = {
                    type: 'box', xMin: chartData.cagrTop1.startStr, xMax: chartData.cagrTop1.endStr,
                    backgroundColor: 'rgba(46, 204, 113, 0.25)', borderWidth: 0, 
                    label: {
                        display: true, content: `1위 (CAGR +${(chartData.cagrTop1.cagr * 100).toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1})}%)`,
                        position: { x: chartData.cagrTop1.labelAlign, y: 'start' }, color: 'black',
                        backgroundColor: 'rgba(255, 255, 255, 0.7)', font: { size: 13, weight: 'bold' }
                    }
                };
            }
            if (chartData.cagrTop2.valid) {
                annotations.box2 = {
                    type: 'box', xMin: chartData.cagrTop2.startStr, xMax: chartData.cagrTop2.endStr,
                    backgroundColor: 'rgba(52, 152, 219, 0.25)', borderWidth: 0, 
                    label: {
                        display: true, content: `2위 (CAGR +${(chartData.cagrTop2.cagr * 100).toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1})}%)`,
                        position: { x: chartData.cagrTop2.labelAlign, y: 'start' }, yAdjust: 32, 
                        color: 'black', backgroundColor: 'rgba(255, 255, 255, 0.7)', font: { size: 13, weight: 'bold' }
                    }
                };
            }
        }

        modal.style.display = 'block';

        myChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartData.labels,
                datasets: [{
                    label: `수정종가 (Log Scale)`,
                    data: chartData.dataPoints,
                    borderColor: '#3498db',
                    borderWidth: 1.5,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    fill: false,
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: { display: false },
                    annotation: { annotations: annotations }
                },
                scales: {
                    x: { 
                        type: 'time',
                        time: { unit: 'year', displayFormats: { year: 'yyyy' } },
                        ticks: { maxRotation: 0 }
                    },
                    y: { 
                        type: 'logarithmic',
                        ticks: { callback: function(value) { return '$' + value.toLocaleString(); } }
                    }
                }
            }
        });
    }

    function closeChartModal() {
        document.getElementById('chartModal').style.display = 'none';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('chartModal');
        if (event.target == modal) closeChartModal();
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(registration => {
                    console.log('ServiceWorker 등록 성공 (오프라인 지원/백그라운드 통과):', registration.scope);
                })
                .catch(err => {
                    console.log('ServiceWorker 등록 실패:', err);
                });
        });
    }
</script>
