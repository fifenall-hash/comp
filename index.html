<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 티커 CAGR & 물림일수 시각화 비교기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script> <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    
    <style>
        :root {
            --primary-color: #27ae60;
            --hover-color: #2ecc71;
            --bg-color: #f4f7f6;
            --box-bg: #ffffff;
            --danger-color: #e74c3c;
            --btn-color: #34495e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            max-width: 1100px; /* 표가 넓어졌으므로 최대 너비 확장 */
            margin: 40px auto;
            padding: 20px;
        }
        .container {
            background-color: var(--box-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-transform: uppercase;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            color: white;
            background-color: var(--primary-color);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: var(--hover-color); }
        
        .chart-btn {
            background-color: var(--btn-color);
            padding: 6px 12px;
            font-size: 13px;
            margin-left: 8px;
            border-radius: 4px;
        }
        .chart-btn:hover { background-color: #2c3e50; }

        .ticker-list-container {
            margin-bottom: 20px;
            padding: 10px;
            background: #eee;
            border-radius: 5px;
            min-height: 40px;
        }
        .ticker-badge {
            display: inline-block;
            background: #2c3e50;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            margin: 5px;
            font-size: 14px;
        }
        .remove-btn {
            cursor: pointer;
            color: #ff6b6b;
            margin-left: 5px;
            font-weight: bold;
        }
        #compareBtn {
            width: 100%;
            background-color: #2980b9;
        }
        #compareBtn:hover { background-color: #2471a3; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 15px;
        }
        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #ddd;
            vertical-align: middle;
        }
        th:first-child, td:first-child { text-align: left; }
        th { background-color: #f8f9fa; }
        .loading {
            text-align: center;
            font-weight: bold;
            color: #e67e22;
            margin-top: 20px;
            display: none;
        }
        .highlight-cagr { color: var(--primary-color); font-weight: bold; }
        .highlight-drawdown { color: var(--danger-color); font-weight: bold; display: flex; align-items: center; justify-content: flex-end; }
        
        /* 모달 팝업 스타일 */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.6); 
        }
        .modal-content {
            background-color: #fff;
            margin: 5% auto;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 1000px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .close-btn {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-btn:hover, .close-btn:focus { color: #000; }
        .chart-container { height: 500px; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 주식 CAGR & 최장 물림구간 비교기</h1>
    
    <div class="input-group">
        <input type="text" id="tickerInput" placeholder="티커 입력 (예: QQQ, TQQQ, 000660.KS)" onkeypress="handleKeyPress(event)">
        <button onclick="addTicker()">추가하기</button>
    </div>

    <div class="ticker-list-container" id="tickerList"></div>

    <button id="compareBtn" onclick="compareTickers()">비교하기</button>

    <div class="loading" id="loadingIndicator">데이터를 분석 중입니다... ⏳</div>

    <table id="resultTable" style="display: none;">
        <thead>
            <tr>
                <th>티커</th>
                <th>최초 데이터</th>
                <th>최신 데이터</th>
                <th>전체 경과일</th>
                <th>최장 물림일수</th>
                <th>최장 물림 기간</th>
                <th>CAGR (연평균 수익률)</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<div id="chartModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeChartModal()">&times;</span>
        <h2 id="modalTitle" style="color: #2c3e50; margin-top: 0;">차트 분석</h2>
        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>
    </div>
</div>

<script>
    let tickers = [];
    let chartDataStore = {}; 
    let myChartInstance = null; 

    function addTicker() {
        const input = document.getElementById('tickerInput');
        const ticker = input.value.trim().toUpperCase();

        if (ticker && !tickers.includes(ticker)) {
            tickers.push(ticker);
            renderTickerList();
            input.value = '';
        } else if (tickers.includes(ticker)) {
            alert('이미 추가된 티커입니다.');
        }
        input.focus();
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') addTicker();
    }

    function removeTicker(ticker) {
        tickers = tickers.filter(t => t !== ticker);
        renderTickerList();
    }

    function renderTickerList() {
        const container = document.getElementById('tickerList');
        container.innerHTML = tickers.map(t => 
            `<span class="ticker-badge">${t} <span class="remove-btn" onclick="removeTicker('${t}')">×</span></span>`
        ).join('');
    }

    async function compareTickers() {
        if (tickers.length === 0) {
            alert('비교할 티커를 최소 1개 이상 입력해주세요.');
            return;
        }

        const btn = document.getElementById('compareBtn');
        const loading = document.getElementById('loadingIndicator');
        const table = document.getElementById('resultTable');
        const tbody = document.getElementById('resultBody');

        btn.disabled = true;
        loading.style.display = 'block';
        table.style.display = 'none';
        tbody.innerHTML = '';
        chartDataStore = {}; 

        try {
            const results = await Promise.all(tickers.map(fetchAndCalculate));
            
            results.forEach(res => {
                if(res.error) {
                    tbody.innerHTML += `<tr><td><strong>${res.ticker}</strong></td><td colspan="6" style="text-align:center; color:red;">데이터를 불러올 수 없습니다.</td></tr>`;
                    return;
                }
                
                const cagrPercent = (res.cagr * 100).toFixed(2);
                
                // N년 계산 로직 (수식 적용)
                const yearsStr = (res.top1.days / 365.2425).toFixed(2);
                const periodStr = `${res.top1.startStr} ~ <br>${res.top1.endStr}`;
                
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${res.ticker}</strong></td>
                        <td>${res.firstDateStr}<br><small>($${res.firstPrice.toFixed(2)})</small></td>
                        <td>${res.lastDateStr}<br><small>($${res.lastPrice.toFixed(2)})</small></td>
                        <td>${res.daysDiff.toLocaleString()} 일</td>
                        <td>
                            <div class="highlight-drawdown">
                                ${yearsStr}년 (${Math.round(res.top1.days).toLocaleString()} 일)
                                <button class="chart-btn" onclick="openChartModal('${res.ticker}')">[차트]</button>
                            </div>
                        </td>
                        <td style="font-size: 0.9em; color: #555;">${periodStr}</td>
                        <td class="highlight-cagr">${cagrPercent}%</td>
                    </tr>
                `;
            });
            table.style.display = 'table';
        } catch (error) {
            alert('오류가 발생했습니다.');
            console.error(error);
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }

    async function fetchAndCalculate(ticker) {
        try {
            const yahooUrl = `https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=max`;
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`;

            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error(`응답 오류: ${response.status}`);
            
            const data = await response.json();
            const resultObj = data.chart.result[0];
            const timestamps = resultObj.timestamp;
            const closePrices = resultObj.indicators.quote[0].close;

            let firstIdx = 0;
            while (firstIdx < closePrices.length && closePrices[firstIdx] === null) { firstIdx++; }

            let lastIdx = closePrices.length - 1;
            while (lastIdx >= 0 && closePrices[lastIdx] === null) { lastIdx--; }

            const firstTime = timestamps[firstIdx]; 
            const lastTime = timestamps[lastIdx];
            const firstPrice = closePrices[firstIdx];
            const lastPrice = closePrices[lastIdx];

            const daysDiff = (lastTime - firstTime) / 86400;
            const cagr = Math.pow((lastPrice / firstPrice), (365.2425 / daysDiff)) - 1;

            // 독립적인 물림 구간들을 저장할 배열
            let drawdowns = [];
            let currentPeakPrice = -1;
            let currentPeakTime = -1;
            let currentDrawdownMaxDays = 0;
            let currentDrawdownLastTime = -1;

            const chartLabels = [];
            const chartDataPoints = [];

            for (let i = firstIdx; i <= lastIdx; i++) {
                const price = closePrices[i];
                const time = timestamps[i];
                if (price === null) continue;

                chartLabels.push(new Date(time * 1000).toISOString().split('T')[0]);
                chartDataPoints.push(price);

                if (price >= currentPeakPrice) {
                    // 전고점을 돌파(회복)했을 때, 진행 중이던 물림 구간을 기록합니다.
                    if (currentPeakTime !== -1 && currentDrawdownMaxDays > 0) {
                        drawdowns.push({
                            start: currentPeakTime,
                            end: currentDrawdownLastTime,
                            days: currentDrawdownMaxDays
                        });
                    }
                    // 새로운 전고점 설정
                    currentPeakPrice = price;
                    currentPeakTime = time;
                    currentDrawdownMaxDays = 0;
                    currentDrawdownLastTime = time;
                } else {
                    // 전고점 아래에 머물러 있는 상태 (물림 지속)
                    const days = (time - currentPeakTime) / 86400;
                    currentDrawdownMaxDays = days;
                    currentDrawdownLastTime = time;
                }
            }
            
            // 배열이 끝났는데도 회복하지 못하고 물려있는 경우 마지막 기록 추가
            if (currentDrawdownMaxDays > 0) {
                drawdowns.push({
                    start: currentPeakTime,
                    end: currentDrawdownLastTime,
                    days: currentDrawdownMaxDays
                });
            }

            // 물림 기간이 가장 긴 순서대로 내림차순 정렬
            drawdowns.sort((a, b) => b.days - a.days);

            // 1위, 2위 물림 구간 추출 (물림이 없었을 경우를 대비해 기본값 설정)
            const top1 = drawdowns[0] || { start: firstTime, end: firstTime, days: 0 };
            const top2 = drawdowns[1] || { start: firstTime, end: firstTime, days: 0 };

            // 타임스탬프를 문자열 날짜로 변환
            top1.startStr = new Date(top1.start * 1000).toISOString().split('T')[0];
            top1.endStr = new Date(top1.end * 1000).toISOString().split('T')[0];
            top2.startStr = new Date(top2.start * 1000).toISOString().split('T')[0];
            top2.endStr = new Date(top2.end * 1000).toISOString().split('T')[0];

            const firstDateStr = new Date(firstTime * 1000).toISOString().split('T')[0];
            const lastDateStr = new Date(lastTime * 1000).toISOString().split('T')[0];

            // 전역 변수에 차트용 1위, 2위 데이터 모두 저장
            chartDataStore[ticker] = {
                labels: chartLabels,
                dataPoints: chartDataPoints,
                top1: top1,
                top2: top2
            };

            return {
                ticker, firstDateStr, lastDateStr, firstPrice, lastPrice,
                daysDiff: Math.round(daysDiff), cagr,
                top1, error: false
            };
        } catch (err) {
            console.error(`${ticker} 에러:`, err);
            return { ticker, error: true };
        }
    }

    function openChartModal(ticker) {
        const modal = document.getElementById('chartModal');
        const title = document.getElementById('modalTitle');
        const ctx = document.getElementById('priceChart').getContext('2d');
        const chartData = chartDataStore[ticker];

        if (!chartData) return;

        title.innerHTML = `${ticker} 주가 흐름 및 1,2위 물림구간`;
        modal.style.display = 'block';

        if (myChartInstance) {
            myChartInstance.destroy();
        }

        // Annotation 객체 동적 생성 (1위, 2위)
        const annotations = {};
        if (chartData.top1.days > 0) {
            annotations.box1 = {
                type: 'box',
                xMin: chartData.top1.startStr,
                xMax: chartData.top1.endStr,
                backgroundColor: 'rgba(231, 76, 60, 0.25)', // 1위: 빨간색
                borderWidth: 0,
                label: {
                    display: true,
                    content: `1위 (${(chartData.top1.days/365.2425).toFixed(2)}년)`,
                    position: 'start',
                    color: 'white',
                    backgroundColor: 'rgba(231, 76, 60, 0.8)',
                    font: { size: 12 }
                }
            };
        }
        if (chartData.top2.days > 0) {
            annotations.box2 = {
                type: 'box',
                xMin: chartData.top2.startStr,
                xMax: chartData.top2.endStr,
                backgroundColor: 'rgba(243, 156, 18, 0.25)', // 2위: 주황색
                borderWidth: 0,
                label: {
                    display: true,
                    content: `2위 (${(chartData.top2.days/365.2425).toFixed(2)}년)`,
                    position: 'start',
                    color: 'white',
                    backgroundColor: 'rgba(243, 156, 18, 0.8)',
                    font: { size: 12 }
                }
            };
        }

        myChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartData.labels,
                datasets: [{
                    label: `${ticker} 종가`,
                    data: chartData.dataPoints,
                    borderColor: '#3498db',
                    borderWidth: 1.5,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    fill: false,
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: { display: false },
                    annotation: { annotations: annotations }
                },
                scales: {
                    // X축 설정을 'time' 스케일로 변경하여 연도별 매년 1월 기준으로 정렬
                    x: { 
                        type: 'time',
                        time: {
                            unit: 'year',
                            displayFormats: {
                                year: 'yyyy' // 2024, 2025 등 연도만 깔끔하게 표시
                            }
                        },
                        ticks: { maxRotation: 0 }
                    },
                    y: { 
                        type: 'linear', 
                        ticks: { callback: function(value) { return '$' + value; } }
                    }
                }
            }
        });
    }

    function closeChartModal() {
        document.getElementById('chartModal').style.display = 'none';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('chartModal');
        if (event.target == modal) closeChartModal();
    }
</script>

</body>
</html>
