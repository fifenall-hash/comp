<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 티커 CAGR & 물림일수 비교기</title>
    <style>
        :root {
            --primary-color: #27ae60;
            --hover-color: #2ecc71;
            --bg-color: #f4f7f6;
            --box-bg: #ffffff;
            --danger-color: #e74c3c;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
        .container {
            background-color: var(--box-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-transform: uppercase;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            color: white;
            background-color: var(--primary-color);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: var(--hover-color); }
        .ticker-list-container {
            margin-bottom: 20px;
            padding: 10px;
            background: #eee;
            border-radius: 5px;
            min-height: 40px;
        }
        .ticker-badge {
            display: inline-block;
            background: #2c3e50;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            margin: 5px;
            font-size: 14px;
        }
        .remove-btn {
            cursor: pointer;
            color: #ff6b6b;
            margin-left: 5px;
            font-weight: bold;
        }
        #compareBtn {
            width: 100%;
            background-color: #2980b9;
        }
        #compareBtn:hover { background-color: #2471a3; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #ddd;
        }
        th:first-child, td:first-child { text-align: left; }
        th { background-color: #f8f9fa; }
        .loading {
            text-align: center;
            font-weight: bold;
            color: #e67e22;
            margin-top: 20px;
            display: none;
        }
        .highlight-cagr { color: var(--primary-color); font-weight: bold; }
        .highlight-drawdown { color: var(--danger-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 주식 CAGR & 리스크 비교기</h1>
    
    <div class="input-group">
        <input type="text" id="tickerInput" placeholder="티커 입력 (예: QQQ, SPY, TSLA)" onkeypress="handleKeyPress(event)">
        <button onclick="addTicker()">추가하기</button>
    </div>

    <div class="ticker-list-container" id="tickerList">
        </div>

    <button id="compareBtn" onclick="compareTickers()">비교하기</button>

    <div class="loading" id="loadingIndicator">데이터를 분석 중입니다. 데이터 양에 따라 시간이 소요될 수 있습니다... ⏳</div>

    <table id="resultTable" style="display: none;">
        <thead>
            <tr>
                <th>티커</th>
                <th>최초 데이터</th>
                <th>최신 데이터</th>
                <th>전체 경과일</th>
                <th>최장 물림일수</th>
                <th>CAGR (연평균 수익률)</th>
            </tr>
        </thead>
        <tbody id="resultBody">
            </tbody>
    </table>
</div>

<script>
    let tickers = [];

    function addTicker() {
        const input = document.getElementById('tickerInput');
        const ticker = input.value.trim().toUpperCase();

        if (ticker && !tickers.includes(ticker)) {
            tickers.push(ticker);
            renderTickerList();
            input.value = '';
        } else if (tickers.includes(ticker)) {
            alert('이미 추가된 티커입니다.');
        }
        input.focus();
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            addTicker();
        }
    }

    function removeTicker(ticker) {
        tickers = tickers.filter(t => t !== ticker);
        renderTickerList();
    }

    function renderTickerList() {
        const container = document.getElementById('tickerList');
        container.innerHTML = tickers.map(t => 
            `<span class="ticker-badge">${t} <span class="remove-btn" onclick="removeTicker('${t}')">×</span></span>`
        ).join('');
    }

    async function compareTickers() {
        if (tickers.length === 0) {
            alert('비교할 티커를 최소 1개 이상 입력해주세요.');
            return;
        }

        const btn = document.getElementById('compareBtn');
        const loading = document.getElementById('loadingIndicator');
        const table = document.getElementById('resultTable');
        const tbody = document.getElementById('resultBody');

        btn.disabled = true;
        loading.style.display = 'block';
        table.style.display = 'none';
        tbody.innerHTML = '';

        try {
            const results = await Promise.all(tickers.map(fetchAndCalculate));
            
            results.forEach(res => {
                if(res.error) {
                    tbody.innerHTML += `<tr><td><strong>${res.ticker}</strong></td><td colspan="5" style="text-align:center; color:red;">데이터를 불러올 수 없습니다.</td></tr>`;
                    return;
                }
                
                // 퍼센트 변환
                const cagrPercent = (res.cagr * 100).toFixed(2);
                
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${res.ticker}</strong></td>
                        <td>${res.firstDateStr}<br><small>($${res.firstPrice.toFixed(2)})</small></td>
                        <td>${res.lastDateStr}<br><small>($${res.lastPrice.toFixed(2)})</small></td>
                        <td>${res.daysDiff.toLocaleString()} 일</td>
                        <td class="highlight-drawdown">${res.maxUnderwaterDays.toLocaleString()} 일</td>
                        <td class="highlight-cagr">${cagrPercent}%</td>
                    </tr>
                `;
            });
            table.style.display = 'table';
        } catch (error) {
            alert('오류가 발생했습니다.');
            console.error(error);
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }

    async function fetchAndCalculate(ticker) {
        try {
            const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=max`;
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(yahooUrl)}`;

            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();

            const resultObj = data.chart.result[0];
            const timestamps = resultObj.timestamp;
            const closePrices = resultObj.indicators.quote[0].close;

            // 1. 유효한 최초/최신 인덱스 찾기
            let firstIdx = 0;
            while (firstIdx < closePrices.length && closePrices[firstIdx] === null) { firstIdx++; }

            let lastIdx = closePrices.length - 1;
            while (lastIdx >= 0 && closePrices[lastIdx] === null) { lastIdx--; }

            const firstTime = timestamps[firstIdx]; 
            const lastTime = timestamps[lastIdx];
            const firstPrice = closePrices[firstIdx];
            const lastPrice = closePrices[lastIdx];

            // 2. 전체 기간 계산 (초 단위 -> 일 단위)
            const daysDiff = (lastTime - firstTime) / 86400;

            // 3. CAGR 계산 (수정된 공식 적용)
            // 수식: (최신종가 / 최초종가) ^ (365.2425 / 경과일수) - 1
            const cagr = Math.pow((lastPrice / firstPrice), (365.2425 / daysDiff)) - 1;

            // 4. 최장 물림일수(Max Underwater Days) 계산 엔진
            let maxUnderwaterDays = 0;
            let currentPeakPrice = -1;
            let currentPeakTime = -1;

            for (let i = firstIdx; i <= lastIdx; i++) {
                const price = closePrices[i];
                const time = timestamps[i];
                
                if (price === null) continue;

                if (price > currentPeakPrice) {
                    // 새로운 전고점 돌파! 
                    currentPeakPrice = price;
                    currentPeakTime = time;
                } else {
                    // 전고점 아래에 머물러 있는 상태 (물림)
                    const underwaterDays = (time - currentPeakTime) / 86400;
                    if (underwaterDays > maxUnderwaterDays) {
                        maxUnderwaterDays = underwaterDays;
                    }
                }
            }

            // 날짜 포맷팅
            const firstDateStr = new Date(firstTime * 1000).toISOString().split('T')[0];
            const lastDateStr = new Date(lastTime * 1000).toISOString().split('T')[0];

            return {
                ticker,
                firstDateStr,
                lastDateStr,
                firstPrice,
                lastPrice,
                daysDiff: Math.round(daysDiff),
                cagr,
                maxUnderwaterDays: Math.round(maxUnderwaterDays),
                error: false
            };
        } catch (err) {
            console.error(`Error fetching ${ticker}:`, err);
            return { ticker, error: true };
        }
    }
</script>

</body>
</html>
